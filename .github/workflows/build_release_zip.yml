name: Build Release ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          if [ -f VERSION.txt ]; then
            VERSION_RAW="$(head -n 1 VERSION.txt | tr -d '\r')"
          else
            VERSION_RAW="dev-build"
          fi
          VERSION_SAFE="$(echo "$VERSION_RAW" | sed 's/[^A-Za-z0-9._-]/_/g')"
          echo "raw=$VERSION_RAW" >> "$GITHUB_OUTPUT"
          echo "safe=$VERSION_SAFE" >> "$GITHUB_OUTPUT"

      - name: Create release zip
        shell: bash
        run: |
          ZIP_NAME="chat_bot_v2_${{ steps.version.outputs.safe }}.zip"
          mkdir -p dist
          zip -r "dist/$ZIP_NAME" .             -x ".git/*"             -x ".github/workflows/*"             -x "__pycache__/*"             -x "*.pyc"             -x ".venv/*"             -x "logs/*"             -x ".env"             -x ".env.*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zip-${{ steps.version.outputs.safe }}
          path: dist/*.zip
          if-no-files-found: error
